# section 1.3, page 25
# section 4.4, page 133
#
# These two interrupt tables do not agree. The differences are noted below.

_add:
  INTMUX:
    description: Cortex M0 MCU Interrupt Multiplexer
    baseAddress: 0xFF2A0000
    addressBlock:
      offset: 0x0000
      size: 0x90
      usage: registers

INTMUX:
  _add:
    IRQ_MASK0:
      description: Interrupt Multiplexer Mask (0-31)
      addressOffset: 0x0000
      fields: &intmux0_fields
        # Using 1.3 name. 4.4 calls this PMUGPIO_0.
        gpio0_0:
          description: GPIO0_0 Interrupt
          bitRange: "[0:0]"
        gpio1_0:
          description: GPIO1_0 Interrupt
          bitRange: "[1:1]"
        gpio2_0:
          description: GPIO2_0 Interrupt
          bitRange: "[2:2]"
        gpio2_1:
          description: GPIO2_1 Interrupt
          bitRange: "[3:3]"
        gpio2_2:
          description: GPIO2_2 Interrupt
          bitRange: "[4:4]"
        gpio3_0:
          description: GPIO3_0 Interrupt
          bitRange: "[5:5]"
        gpio3_1:
          description: GPIO3_1 Interrupt
          bitRange: "[6:6]"
        gpio3_2:
          description: GPIO3_2 Interrupt
          bitRange: "[7:7]"
        gpio4_0:
          description: GPIO4_0 Interrupt
          bitRange: "[8:8]"
        gpio4_1:
          description: GPIO4_1 Interrupt
          bitRange: "[9:9]"
        gpio4_2:
          description: GPIO4_2 Interrupt
          bitRange: "[10:10]"
        gpio4_3:
          description: GPIO4_3 Interrupt
          bitRange: "[11:11]"
        # Using 4.4 names for PWM. 1.3 calls these PWM0_CH0 etc.
        pwm0_0:
          description: PWM0_0 Interrupt
          bitRange: "[12:12]"
        pwm0_1:
          description: PWM0_1 Interrupt
          bitRange: "[13:13]"
        pwm0_2:
          description: PWM0_2 Interrupt
          bitRange: "[14:14]"
        pwm0_3:
          description: PWM0_3 Interrupt
          bitRange: "[15:15]"
        pwm1_0:
          description: PWM1_0 Interrupt
          bitRange: "[16:16]"
        pwm1_1:
          description: PWM1_1 Interrupt
          bitRange: "[17:17]"
        pwm1_2:
          description: PWM1_2 Interrupt
          bitRange: "[18:18]"
        pwm1_3:
          description: PWM1_3 Interrupt
          bitRange: "[19:19]"
        pwm1_4:
          description: PWM1_4 Interrupt
          bitRange: "[20:20]"
        pwm1_5:
          description: PWM1_5 Interrupt
          bitRange: "[21:21]"
        uart0:
          description: UART0 Interrupt
          bitRange: "[22:22]"
        uart1:
          description: UART1 Interrupt
          bitRange: "[23:23]"
        uart2:
          description: UART2 Interrupt
          bitRange: "[24:24]"
        uart5:
          description: UART5 Interrupt
          bitRange: "[25:25]"
        i2c0:
          description: I2C0 Interrupt
          bitRange: "[26:26]"
        i2c1:
          description: I2C1 Interrupt
          bitRange: "[27:27]"
        spi0:
          description: SPI0 Interrupt
          bitRange: "[28:28]"
        can0:
          description: CAN0 Interrupt
          bitRange: "[29:29]"
        can1:
          description: CAN1 Interrupt
          bitRange: "[30:30]"
        spdif_tx:
          description: SPDIF_TX Interrupt
          bitRange: "[31:31]"

    IRQ_MASK1:
      description: Interrupt Multiplexer Mask (32-63)
      addressOffset: 0x0004
      fields: &intmux1_fields
        spdif_rx:
          description: SPDIF_RX Interrupt
          bitRange: "[0:0]"
        pdm:
          description: PDM Interrupt
          bitRange: "[1:1]"
        sai0:
          description: SAI0 Interrupt
          bitRange: "[2:2]"
        sai1:
          description: SAI1 Interrupt
          bitRange: "[3:3]"
        sai2:
          description: SAI2 Interrupt
          bitRange: "[4:4]"
        sai3:
          description: SAI3 Interrupt
          bitRange: "[5:5]"
        sai4:
          description: SAI4 Interrupt
          bitRange: "[6:6]"
        asrc0:
          description: ASRC0 Interrupt
          bitRange: "[7:7]"
        asrc1:
          description: ASRC1 Interrupt
          bitRange: "[8:8]"
        tsadc:
          description: TSADC Interrupt
          bitRange: "[9:9]"
        vop:
          description: VOP Interrupt
          bitRange: "[10:10]"
        mipi_dsihost:
          description: MIPI_DSIHOST Interrupt
          bitRange: "[11:11]"
        rga:
          description: RGA Interrupt
          bitRange: "[12:12]"
        otpc_ns:
          description: OTPC_NS Interrupt
          bitRange: "[13:13]"
        otpc_s:
          description: OTPC_S Interrupt
          bitRange: "[14:14]"
        # Using 1.3 name. 4.4 calls this KEYREADER.
        key_reader:
          description: KEY_READER Interrupt
          bitRange: "[15:15]"
        otpc_mask:
          description: OTPC_MASK Interrupt
          bitRange: "[16:16]"
        # Using 1.3 name. 4.4 calls these GMAC0_SBD etc.
        # and also uses GMAC0_SBD_PERCH_TX instead of GMAC0_SBD_TX.
        mac0_sbd:
          description: MAC0_SBD Interrupt
          bitRange: "[17:17]"
        mac0_sbd_tx:
          description: MAC0_SBD_TX Interrupt
          bitRange: "[18:18]"
        mac0_sbd_rx:
          description: MAC0_SBD_RX Interrupt
          bitRange: "[19:19]"
        mac0_pmt:
          description: MAC0_PMT Interrupt
          bitRange: "[20:20]"
        mac1_sbd:
          description: MAC1_SBD Interrupt
          bitRange: "[21:21]"
        mac1_sbd_tx:
          description: MAC1_SBD_TX Interrupt
          bitRange: "[22:22]"
        mac1_sbd_rx:
          description: MAC1_SBD_RX Interrupt
          bitRange: "[23:23]"
        mac1_pmt:
          description: MAC1_PMT Interrupt
          bitRange: "[24:24]"
        # Using 1.3 name. 4.4 calls this USB2OTG0
        otg0:
          description: OTG0 Interrupt
          bitRange: "[25:25]"
        otg0_bvalid:
          description: OTG0_BVALID Interrupt
          bitRange: "[26:26]"
        otg0_id:
          description: OTG0_ID Interrupt
          bitRange: "[27:27]"
        otg0_linestate:
          description: OTG0_LINESTATE Interrupt
          bitRange: "[28:28]"
        otg0_disconnect:
          description: OTG0_DISCONNECT Interrupt
          bitRange: "[29:29]"
        # Using 1.3 name. 4.4 calls this USB2OTG1
        otg1:
          description: OTG1 Interrupt
          bitRange: "[30:30]"
        otg1_bvalid:
          description: OTG1_BVALID Interrupt
          bitRange: "[31:31]"

    IRQ_MASK2:
      description: Interrupt Multiplexer Mask (64-95)
      addressOffset: 0x0008
      fields: &intmux2_fields
        otg1_id:
          description: OTG1_ID Interrupt
          bitRange: "[0:0]"
        otg1_linestate:
          description: OTG1_LINESTATE Interrupt
          bitRange: "[1:1]"
        otg1_disconnect:
          description: OTG1_DISCONNECT Interrupt
          bitRange: "[2:2]"
        spi2apb:
          description: SPI2APB Interrupt
          bitRange: "[3:3]"
        # Using 1.3 name, 4.4 calls this SFC.
        fspi:
          description: FSPI Interrupt
          bitRange: "[4:4]"
        # Using 1.3 name, 4.4 calls these DDRC_AWPOISON0 etc.
        ddrc_awpoison0:
          description: DDRC_AWPOISON0 Interrupt
          bitRange: "[5:5]"
        ddrc_awpoison1:
          description: DDRC_AWPOISON1 Interrupt
          bitRange: "[6:6]"
        ddrc_arpoison0:
          description: DDRC_ARPOISON0 Interrupt
          bitRange: "[7:7]"
        ddrc_arpoison1:
          description: DDRC_ARPOISON1 Interrupt
          bitRange: "[8:8]"
        ddrc_dfi_alert_err:
          description: DDRC_DFI_ALERT_ERR Interrupt
          bitRange: "[9:9]"
        ddr_monitor:
          description: DDR_MONITOR Interrupt
          bitRange: "[10:10]"
        ddrphy:
          description: DDRPHY Interrupt
          bitRange: "[11:11]"
        # Using 1.3 name, 4.4 calls these RKTIMER0 etc.
        timer0_0:
          description: TIMER0_0 Interrupt
          bitRange: "[12:12]"
        timer0_1:
          description: TIMER0_1 Interrupt
          bitRange: "[13:13]"
        timer0_2:
          description: TIMER0_2 Interrupt
          bitRange: "[14:14]"
        timer0_3:
          description: TIMER0_3 Interrupt
          bitRange: "[15:15]"
        # Using 1.3 name, 4.4 calls these STIMER0 etc.
        timer1_0:
          description: TIMER1_0 Interrupt
          bitRange: "[16:16]"
        timer1_1:
          description: TIMER1_1 Interrupt
          bitRange: "[17:17]"
        timer1_2:
          description: TIMER1_2 Interrupt
          bitRange: "[18:18]"
        timer1_3:
          description: TIMER1_3 Interrupt
          bitRange: "[19:19]"
        hptimer:
          description: HPTIMER Interrupt
          bitRange: "[20:20]"
        wdt0:
          description: WDT0 Interrupt
          bitRange: "[21:21]"
        wdt1:
          description: WDT1 Interrupt
          bitRange: "[22:22]"
        # 1.3 marks this as reserved, 4.4 calls it MAILBOX_AP
        # In testing, it never fired for me.
        #mailbox_ap:
        #  description: MAILBOX_AP Interrupt
        #  bitRange: "[23:23]"
        crypto:
          description: CRYPTO Interrupt
          bitRange: "[24:24]"
        crypto_klad:
          description: CRYPTO_KLAD Interrupt
          bitRange: "[25:25]"
        crypto_sc:
          description: CRYPTO_SC Interrupt
          bitRange: "[26:26]"
        # Using 1.3 name, 4.4 calls these NSTRNG and STRNG.
        ns_trng:
          description: NS_TRNG Interrupt
          bitRange: "[27:27]"
        s_trng:
          description: S_TRNG Interrupt
          bitRange: "[28:28]"
        # Using 1.3 name, 4.4 calls this DSMC_SLV.
        dsmc_slave:
          description: DSMC_SLAVE Interrupt
          bitRange: "[29:29]"
        # Using 1.3 names, 4.4 calls these SYSCORE_0 etc.
        a7_pmuirq_0:
          description: A7_PMUIRQ_0 Interrupt
          bitRange: "[30:30]"
        a7_pmuirq_1:
          description: A7_PMUIRQ_1 Interrupt
          bitRange: "[31:31]"

    IRQ_MASK3:
      description: Interrupt Multiplexer Mask (96-125)
      addressOffset: 0x000C
      fields: &intmux3_fields
        # Using 1.3 names, 4.4 calls these SYSCORE_2 etc.
        a7_pmuirq_2:
          description: A7_PMUIRQ_2 Interrupt
          bitRange: "[0:0]"
        a7_pmuirq_3:
          description: A7_PMUIRQ_3 Interrupt
          bitRange: "[1:1]"
        # Using 1.3 name, 4.4 calls this SYSCORE_4.
        a7_axierrirq:
          description: A7_AXIERRIRQ Interrupt
          bitRange: "[2:2]"
        # Using 1.3 name, 4.4 calls this STRIMER_DSMC_MUX.
        dsmc_timer1_5:
          description: DSMC/TIMER1_5 Interrupt
          bitRange: "[3:3]"
        pmu:
          description: PMU Interrupt
          bitRange: "[4:4]"
        # Using 1.3 name, 4.4 calls this RKNPOR_POWERNGOOD.
        npor_powergood:
          description: NPOR_POWERGOOD Interrupt
          bitRange: "[5:5]"
        gpio1_shadow_0:
          description: GPIO1_SHADOW_0 Interrupt
          bitRange: "[6:6]"
        # Using 4.4 names, 1.3 calls these GPIO1_SHADOW_1/GPIO1_1 etc.
        gpio1_1:
          description: GPIO1_SHADOW_1/GPIO1_1 Interrupt
          bitRange: "[7:7]"
        gpio1_2:
          description: GPIO1_SHADOW_2/GPIO1_2 Interrupt
          bitRange: "[8:8]"
        gpio1_3:
          description: GPIO1_SHADOW_3/GPIO1_3 Interrupt
          bitRange: "[9:9]"
        otg0_vbusvalid:
          description: OTG0_VBUSVALID Interrupt
          bitRange: "[10:10]"
        otg1_vbusvalid:
          description: OTG1_VBUSVALID Interrupt
          bitRange: "[11:11]"
        # Using 1.3 names, 4.4 calls this VOP_POST_LB.
        vop_lb_intr:
          description: VOP_LB_INTR Interrupt
          bitRange: "[12:12]"
        dma2ddr:
          description: DMA2DDR Interrupt
          bitRange: "[13:13]"
        # Using 1.3 names, 4.4 calls these MAILBOX_AP_0 etc.
        mailbox_ap0:
          description: MAILBOX_AP0 Interrupt
          bitRange: "[14:14]"
        mailbox_ap1:
          description: MAILBOX_AP1 Interrupt
          bitRange: "[15:15]"
        mailbox_ap2:
          description: MAILBOX_AP2 Interrupt
          bitRange: "[16:16]"
        mailbox_ap3:
          description: MAILBOX_AP3 Interrupt
          bitRange: "[17:17]"
        mailbox_bb0:
          description: MAILBOX_BB0 Interrupt
          bitRange: "[18:18]"
        mailbox_bb1:
          description: MAILBOX_BB1 Interrupt
          bitRange: "[19:19]"
        mailbox_bb2:
          description: MAILBOX_BB2 Interrupt
          bitRange: "[20:20]"
        mailbox_bb3:
          description: MAILBOX_BB3 Interrupt
          bitRange: "[21:21]"
        # Using 1.3 names, 4.4 calls these GMAC0_MCGR_DMA etc.
        mac0_mcgr_req:
          description: MAC0_MCGR_REQ Interrupt
          bitRange: "[22:22]"
        mac1_mcgr_req:
          description: MAC1_MCGR_REQ Interrupt
          bitRange: "[23:23]"
        # Using 4.4 names, 1.3 calls these DMAC0_MASK_IRQ0 etc.
        dmac0_mask0:
          description: DMAC0_MASK0 Interrupt
          bitRange: "[24:24]"
        dmac0_mask1:
          description: DMAC0_MASK1 Interrupt
          bitRange: "[25:25]"
        dmac0_mask2:
          description: DMAC0_MASK2 Interrupt
          bitRange: "[26:26]"
        # Using neither names. 1.3 calls these DMAC1_MASK_IRQ0 etc,
        # 4.4 calls these DMAC1_MASK0, DMAC2_MASK1, DMAC3_MASK2 (???).
        dmac1_mask0:
          description: DMAC1_MASK0 Interrupt
          bitRange: "[27:27]"
        dmac1_mask1:
          description: DMAC2_MASK1 Interrupt
          bitRange: "[28:28]"
        dmac1_mask2:
          description: DMAC3_MASK2 Interrupt
          bitRange: "[29:29]"

        # Bits 30, 31 are reserved.

    IRQ_FLAG0:
      description: Interrupt Multiplexer Flags (0-31)
      addressOffset: 0x0080
      access: read-only
      fields: *intmux0_fields

    IRQ_FLAG1:
      description: Interrupt Multiplexer Flags (32-63)
      addressOffset: 0x0084
      access: read-only
      fields: *intmux1_fields

    IRQ_FLAG2:
      description: Interrupt Multiplexer Flags (64-95)
      addressOffset: 0x0088
      access: read-only
      fields: *intmux2_fields

    IRQ_FLAG3:
      description: Interrupt Multiplexer Flags (96-125)
      addressOffset: 0x008C
      access: read-only
      fields: *intmux3_fields

  IRQ_*:
    # flags and mask are all just plain bits
    "*": [0, 1]
